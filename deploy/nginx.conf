# ─── PoliticOS — nginx config ─────────────────────────────────────────────────
# Place in /etc/nginx/sites-available/politicos.pe
# sudo ln -s /etc/nginx/sites-available/politicos.pe /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name politicos.pe *.politicos.pe;
    return 301 https://$host$request_uri;
}

# ── Laravel API  (api.politicos.pe) ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.politicos.pe;

    root /var/www/politicos/public;
    index index.php;

    # TLS — certbot populates these automatically
    ssl_certificate     /etc/letsencrypt/live/api.politicos.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.politicos.pe/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    server_tokens off;

    # ── Headers de seguridad ──────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(self)" always;

    # ── SuperAdmin — solo desde IP del equipo/VPN ─────────────────────────
    # ⚠ Reemplaza 203.0.113.1 con tu IP real antes de subir al servidor
    location /api/superadmin {
        allow 203.0.113.1;
        deny all;
        try_files $uri $uri/ /index.php?$query_string;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── SSE — chat/stream sin buffering ──────────────────────────────────
    location /api/chat/stream {
        try_files $uri $uri/ /index.php?$query_string;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering    off;
        fastcgi_read_timeout 120;
        add_header X-Accel-Buffering "no";
        add_header Cache-Control     "no-cache, no-store";
    }

    # Serve storage symlink files directly
    location /storage/ {
        alias /var/www/politicos/storage/app/public/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Pass everything else through Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # Deny .env and other sensitive files
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    # Upload size for media files (videos up to 200 MB)
    client_max_body_size 220M;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # CORS lo maneja Laravel (config/cors.php) — no duplicar aquí

    access_log /var/log/nginx/politicos-api.access.log;
    error_log  /var/log/nginx/politicos-api.error.log;
}

# ── Next.js Frontend  (*.politicos.pe catch-all) ──────────────────────────────
# Each candidate's site runs at {slug}.politicos.pe
# The frontend reads the subdomain and sends X-Tenant header to the API.
server {
    listen 443 ssl http2;
    server_name ~^(?<tenant>.+)\.politicos\.pe$;

    ssl_certificate     /etc/letsencrypt/live/politicos.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/politicos.pe/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }

    # Static Next.js assets — served from disk (much faster than proxying)
    location /_next/static/ {
        alias /var/www/politicos/resources/js/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/politicos-frontend.access.log;
    error_log  /var/log/nginx/politicos-frontend.error.log;
}
