; PoliticOS — overrides de PHP para el contenedor de Render (demo)
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 120

; SSE: no comprimir ni bufferizar la salida a nivel PHP
output_buffering = Off
zlib.output_compression = Off

; OPcache (producción)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0

expose_php = Off
