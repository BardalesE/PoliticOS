# PoliticOS — stack base: vector store compartido + ingesta de DESARROLLO
# Levanta Qdrant (compartido entre todas las instancias) + Redis + el
# servicio Python single-tenant para dev local.
#
# Uso:
#   docker compose up -d
#
# Qdrant queda en localhost:6333 (HTTP) y :6334 (gRPC), y publicado en la
# red `politicos-net` para las instancias por candidato
# (docker-compose.instance.yml). Este stack crea esa red.
# El servicio de ingesta de dev queda en localhost:8001.

services:
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: politicos-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    networks:
      - default
      - politicos-net

  redis:
    image: redis:7-alpine
    container_name: politicos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  ingest:
    build: .
    container_name: politicos-ingest
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379

  ingest-worker:
    build: .
    container_name: politicos-ingest-worker
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    command: python -m celery -A app.celery_app worker --loglevel=info --concurrency=4

  ingest-beat:
    build: .
    container_name: politicos-ingest-beat
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    command: python -m celery -A app.celery_app beat --loglevel=info

networks:
  default:
  # Red compartida con las instancias por candidato. Este stack la crea con
  # nombre fijo; docker-compose.instance.yml la referencia como external.
  politicos-net:
    name: politicos-net

volumes:
  qdrant_data:
  redis_data:
